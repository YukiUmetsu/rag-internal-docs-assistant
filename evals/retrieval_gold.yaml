queries:
  - id: pto_days_current
    category: latest_policy_fact
    query: "How many PTO days do employees get?"
    expected_sources:
      - "pto_policy_2026.md"
    expected_facts:
      - "18 days"

  - id: refund_window_current
    category: latest_policy_fact
    query: "What is the refund window?"
    expected_sources:
      - "refund_policy_2026.md"
    expected_facts:
      - "30 days"

  - id: retry_attempts_exact
    category: factual_lookup
    query: "How many retry attempts are allowed?"
    expected_sources:
      - "payment_flow.md"
      - "failed_payment_playbook.md"
    expected_facts:
      - "3"

  - id: exact_known_issues
    category: exact_term
    query: "Known Issues"
    expected_sources:
      - "failed_payment_playbook.md"

  - id: exact_sev2
    category: exact_term
    query: "SEV2"
    expected_sources:
      - "payment_failure_spike.md"
    expected_facts:
      - "partial degradation"

  - id: exact_on_call
    category: exact_term
    query: "On-Call"
    expected_sources:
      - "payment_failure_spike.md"

  - id: pto_policy_ambiguous
    category: ambiguous
    query: "What is the PTO policy?"
    expected_sources:
      - "pto_policy_2026.md"
    expected_facts:
      - "18 days"

  - id: refund_policy_ambiguous
    category: ambiguous
    query: "Tell me about the refund policy"
    expected_sources:
      - "refund_policy_2026.md"
      - "refund_policy_2026.pdf"

  - id: refund_approval_current
    category: version_sensitive
    query: "When is manager approval required for refunds?"
    expected_sources:
      - "refund_policy_2026.md"
      - "refund_policy_2026.pdf"

  - id: refund_window_2025
    category: version_sensitive
    query: "What was the refund window in 2025?"
    expected_sources:
      - "refund_policy_2025.md"