services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-acme_assistant}
      POSTGRES_USER: ${POSTGRES_USER:-acme}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-acme}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER:-acme} -d $${POSTGRES_DB:-acme_assistant}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: alembic upgrade head
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://acme:acme@postgres:5432/acme_assistant}
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools

  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: >
      python -m uvicorn src.backend.app.main:app
      --reload
      --host 0.0.0.0
      --port 8000
    ports:
      - "8000:8000"
    environment:
      APP_NAME: ${APP_NAME:-Acme Company Assistant API}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      CHUNKS_PATH: ${CHUNKS_PATH:-artifacts/chunks.jsonl}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://acme:acme@postgres:5432/acme_assistant}
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-sentence-transformers/all-MiniLM-L6-v2}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL_NAME: ${GROQ_MODEL_NAME:-}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-acme-company-assistant-dev}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-true}
      RERANK_MODEL_NAME: ${RERANK_MODEL_NAME:-cross-encoder/ms-marco-MiniLM-L-6-v2}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      TOKENIZERS_PARALLELISM: ${TOKENIZERS_PARALLELISM:-false}
      VECTORSTORE_PATH: ${VECTORSTORE_PATH:-artifacts/faiss_index}
    volumes:
      - .:/app
      - backend-hf-cache:/root/.cache/huggingface
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: celery -A src.backend.app.core.queue:celery_app worker --loglevel=info
    environment:
      APP_NAME: ${APP_NAME:-Acme Company Assistant API}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://acme:acme@postgres:5432/acme_assistant}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      TOKENIZERS_PARALLELISM: ${TOKENIZERS_PARALLELISM:-false}
    volumes:
      - .:/app
      - backend-hf-cache:/root/.cache/huggingface
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    command: npm run dev -- --host 0.0.0.0 --port 5173
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    volumes:
      - ./src/frontend:/app
      - frontend-node-modules:/app/node_modules
    depends_on:
      - api

volumes:
  backend-hf-cache:
  frontend-node-modules:
  postgres-data:
