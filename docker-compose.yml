services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: >
      python -m uvicorn src.backend.app.main:app
      --reload
      --host 0.0.0.0
      --port 8000
    ports:
      - "8000:8000"
    environment:
      APP_NAME: ${APP_NAME:-Acme Company Assistant API}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      CHUNKS_PATH: ${CHUNKS_PATH:-artifacts/chunks.jsonl}
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-sentence-transformers/all-MiniLM-L6-v2}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL_NAME: ${GROQ_MODEL_NAME:-}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-acme-company-assistant-dev}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-true}
      RERANK_MODEL_NAME: ${RERANK_MODEL_NAME:-cross-encoder/ms-marco-MiniLM-L-6-v2}
      TOKENIZERS_PARALLELISM: ${TOKENIZERS_PARALLELISM:-false}
      VECTORSTORE_PATH: ${VECTORSTORE_PATH:-artifacts/faiss_index}
    volumes:
      - .:/app
      - backend-hf-cache:/root/.cache/huggingface
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    command: npm run dev -- --host 0.0.0.0 --port 5173
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    volumes:
      - ./src/frontend:/app
      - frontend-node-modules:/app/node_modules
    depends_on:
      - api

volumes:
  backend-hf-cache:
  frontend-node-modules:
